<eda-dialog2 [display]="display" i18n-header="@@newDashboardtitle" header="CREA UN NUEVO INFORME" width="45vw" height="72vh" (close)="onClose()"
  (apply)="createNewDashboard()" [disableApply]="form.invalid || aiLoading">
  <div content>
    <form [formGroup]="form" class="form-horizontal form-material" (ngSubmit)="createNewDashboard()">
      <div class="grid">
        <div class="mt-6">
          <input type="text" pInputText formControlName="name" class="input-corporate w-full py-2.5 px-2 border rounded-md"
            i18n-placeholder="@@labelDameNombre" placeholder="Dame un nombre *" required>
        </div>

        <div class="mt-6">
          <p-dropdown id="float-ds" formControlName="ds" [options]="dataSources" optionLabel="model_name"
            [showClear]="true" i18n-placeholder="@@selectFuenteDatos" placeholder="Selecciona una fuente de datos *"
            required [style]="{'minWidth':'100%'}">
          </p-dropdown>
        </div>

        <div class="mt-9">
          <p-selectButton [options]="visibleTypes" class="visibility-selector" formControlName="visible" (onChange)="handleSelectedBtn($event)"></p-selectButton>
        </div>

        @if (showGroups) {
          <div class="mt-6">
            <p-multiSelect id="float-grups" formControlName="group" [options]="grups" [filter]="false" optionLabel="name"
              i18n-defaultLabel="@@multiSelectDefaultLabel" defaultLabel="Selecciona un grupo *" appendTo="body"
              [style]="{'width': '100%'}">
            </p-multiSelect>
          </div>
        }

        <div class="mt-6">
          <textarea formControlName="aiDescription" rows="4"
            class="input-corporate w-full py-2.5 px-2 border rounded-md"
            style="resize: vertical; font-family: inherit; font-size: inherit;"
            i18n-placeholder="@@aiDashboardDescription"
            placeholder="(Opcional) Describe los paneles que quieres generar con IA. Ejemplo: ventas por mes en barras, top clientes por importe, KPI de facturación total.">
          </textarea>
        </div>

        @if (aiLoading) {
          <div class="mt-4 flex items-center gap-2" style="color: var(--corporate-primary);">
            <i class="pi pi-spin pi-spinner"></i>
            <span i18n="@@aiGeneratingDashboard">Generando dashboard con IA...</span>
          </div>
        }
      </div>
    </form>
  </div>
</eda-dialog2>

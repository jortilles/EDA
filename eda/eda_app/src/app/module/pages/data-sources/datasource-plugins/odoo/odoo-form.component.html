<div class="p-6" [formGroup]="connectionForm">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- Odoo: URL -->
    <div class="space-y-2">
      <label class="block font-medium" i18n="@@odooUrlLabel">
        URL de Odoo <span class="text-red-500">*</span>
      </label>
      <div class="relative">
        <input type="text" formControlName="host" placeholder="https://mi-odoo.com"
          class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md"
          [class.border-red-500]="connectionForm.get('host')?.invalid && connectionForm.get('host')?.touched" />
        <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-2.5 h-4 w-4 text-gray-500" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2" />
        </svg>
      </div>
    </div>

    <!-- Odoo: Database -->
    <div class="space-y-2">
      <label class="block font-medium" i18n="@@inputNombreDB">
        Base de datos <span class="text-red-500">*</span>
      </label>
      <div class="relative">
        <input type="text" formControlName="database" placeholder="nombre_base_odoo"
          class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md"
          [class.border-red-500]="connectionForm.get('database')?.invalid && connectionForm.get('database')?.touched" />
        <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-2.5 h-4 w-4 text-gray-500" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7C5 4 4 5 4 7z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6" />
        </svg>
      </div>
    </div>

    <!-- Odoo: User -->
    <div class="space-y-2">
      <label class="block font-medium" i18n="@@placeholderInputUsuario">
        Usuario <span class="text-red-500">*</span>
      </label>
      <div class="relative">
        <input type="text" formControlName="user" placeholder="admin"
          class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md"
          [class.border-red-500]="connectionForm.get('user')?.invalid && connectionForm.get('user')?.touched" />
        <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-2.5 h-4 w-4 text-gray-500" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
    </div>

    <!-- Odoo: Password -->
    <div class="space-y-2">
      <label class="block font-medium" i18n="@@password">
        Contraseña <span class="text-red-500">*</span>
      </label>
      <div class="relative">
        <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
          placeholder="••••••••"
          class="w-full pl-9 pr-10 py-2 border border-gray-300 rounded-md"
          [class.border-red-500]="connectionForm.get('password')?.invalid && connectionForm.get('password')?.touched" />
        <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-2.5 h-4 w-4 text-gray-500" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
        <button type="button" class="absolute right-3 top-2.5 text-gray-500 hover:text-gray-700"
          (click)="togglePasswordVisibility()">
          @if (!showPassword) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
              viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
              viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
          }
        </button>
      </div>
    </div>

    <!-- Odoo: info -->
    <div class="md:col-span-2 p-3 bg-blue-50 rounded-md border border-blue-200 text-sm text-blue-700"
         i18n="@@odooInfoMessage">
      Al confirmar se descargarán las facturas, líneas, clientes, productos y vendedores de Odoo
      y se crearán como tablas en un datasource DuckDB. La descarga puede tardar unos segundos
      dependiendo del volumen de datos.
    </div>

  </div>
</div>

<!-- ============================================================== -->
<!-- GLOBAL FILTERS  -->
<!-- ============================================================== -->
<div [ngClass]="{'noShow': hideFilters }" >
    <!--   panel mode es per quan vull mostrat nomes un panell-->
    <div *ngIf="globalFilters.length > 0" class="d-flex align-items-end" style="margin: 0.5em; gap: 10px; flex-wrap: wrap;" >
        <button
            *ngIf="isAdmin || isDashboardCreator || filterButtonVisibility.public"
            id="dashFilterBtn"
            [label]="filtrar"
            pButton pRipple type="button"
            icon="pi pi-filter"
            style="height: 36px; min-width: 80px;"
            (click)="dashboard.reloadPanelsWithTimeOut()"
            class="p-button-raised p-button-outlined filters-size">
        </button>


       <!-- SDA CUSTOM -->  <div *ngFor="let filter of globalFilters" class="filter-set d-flex align-items-center" [class.filter-hover-active]="filterHoverActiveId === filter.id" (mouseenter)="onFilterHover(filter)" (mouseleave)="onFilterLeave()">
          <!-- SDA CUSTOM <span *ngIf="( isAdmin || isDashboardCreator || ['public', 'readOnly'].includes(filter.visible) )  &&  filter.selectedColumn.visible " class="filter-name filters-size"> -->
          <!-- SDA CUSTOM --> <span *ngIf="( isAdmin || isDashboardCreator || (['public', 'readOnly'].includes(filter.visible)   &&  (filter.selectedColumn?.visible || filter.column?.value?.visible)) )" class="filter-name filters-size">
                {{getFilterLabel(filter)}}:
            </span>
            <!-- SDA CUSTOM --> <span *ngIf="filterHoverActiveId === filter.id" class="filter-hover-tooltip" [innerHTML]="filterHoverTooltipHtml"></span>

            <!-- SDA CUSTOM  <ng-container -->
            <!-- SDA CUSTOM *ngIf="( isAdmin || isDashboardCreator ||   ['public', 'readOnly'].includes(filter.visible) ) &&  filter.selectedColumn.visible  " -->
            <!-- SDA CUSTOM --> <ng-container
            *ngIf="( isAdmin || isDashboardCreator || (['public', 'readOnly'].includes(filter.visible)   &&  (filter.selectedColumn?.visible || filter.column?.value.visible)) )"
            [ngSwitch]="getFilterType(filter)" >
<!-- SDA CUSTOM --><div *ngSwitchCase="'date'" class="d-flex align-items-center" style="gap: 6px;">

                    <!-- Botón que muestra el valor configurado y abre el date-format-dialog -->
<!-- SDA CUSTOM --><button pButton pRipple type="button" [disabled]="disableGlobalFilter(filter)" (click)="onOpenDateFormatDialog(filter)" class="filters-size date-filter-btn" [style]="{'min-width': '160px', 'height': '26px'}">
<!-- SDA CUSTOM -->    <span *ngIf="filter.dateFilterType" class="date-filter-operator">{{ getDateFilterOperatorText(filter) }}</span>
<!-- SDA CUSTOM -->    <span class="date-filter-value p-button-label" [ngClass]="{'date-filter-value--dynamic': isDynamicDateRange(filter)}">{{ getDateFilterValueText(filter) }}</span>
<!-- SDA CUSTOM --></button>

<!-- date-format-dialog por filtro -->
<!-- SDA CUSTOM -->    <date-format-dialog *ngIf="displayDateFormatMap[filter.id]" (close)="onCloseDateFormatDialog($event, filter)" [cleanButtonsAvailable]="true" [selectedColumn]="filter.selectedColumn" [currentFilter]="filter">
<!-- SDA CUSTOM -->            <ng-container footer>
<!-- SDA CUSTOM -->                <button *ngIf="dashboard.canIedit()" id="dashFilterConf" pButton pRipple type="button" icon="pi pi-cog" (click)="displayDateFormatMap[filter.id] = false; onShowGlobalFilter(false, filter)" class="p-button-rounded p-button-outlined p-button-icon-only filters-size" style="width: 2rem; height: 2rem; padding: 0;"></button>
<!-- SDA CUSTOM -->            </ng-container>
<!-- SDA CUSTOM -->    </date-format-dialog>

<!-- SDA CUSTOM --></div>
                <div *ngSwitchDefault>

                    <!-- SDA CUSTOM <p-multiSelect *ngIf="filter.data && ( isAdmin || isDashboardCreator || (['public', 'readOnly'].includes(filter.visible)   &&  (filter.selectedColumn?.visible || filter.column?.value.visible)) )" -->
                    <!-- SDA CUSTOM --> <p-multiSelect *ngIf="filter.data && ( isAdmin || isDashboardCreator || (['public', 'readOnly'].includes(filter.visible)   &&  (filter.selectedColumn?.visible || filter.column?.value.visible)) )"
                        [options]="filter.data"
                        [(ngModel)]="filter.selectedItems"
                        [maxSelectedLabels]="3"
                        [selectedItemsLabel]="'{0} ' + selectedItemsLabel"
                        [virtualScroll]="true"
                        [defaultLabel]="getFilterLabel(filter)"
                        [disabled]="disableGlobalFilter(filter)"
                        itemSize="30"
                        [display]="(filter.selectedItems && filter.selectedItems.length > 3) ? 'comma' : 'chip'"
                        class="customMultiselect filters-size"
                        [style]="{'max-width': '250px', 'min-width':'200px', 'font-family':'var(--eda-filters-font-family)'}"
                        [Show]="dropdownFiltersSize(filter)"
                        appendTo="body"
                        (onChange)="setGlobalFilterItems(filter)"
                        (mouseenter)="showFilterTooltip($event, op, filter)"
                        (mouseleave)="hideFilterTooltip(op)"
                        (onClick)="hideFilterTooltip(op)">
                        <p-footer>
                            <button *ngIf="dashboard.canIedit()" id="dashFilterConf"
                                pButton pRipple type="button"
                                icon="pi pi-cog"
                                (click)="onShowGlobalFilter(false, filter)"
                                class="p-button-rounded p-button-outlined filters-size">
                            </button>
                        </p-footer>
                    </p-multiSelect>
<!-- SDA CUSTOM -->      <p-overlayPanel #op appendTo="body" [style]="{'margin-top': '2.25vh'}">
<!-- SDA CUSTOM -->          <ng-template pTemplate>
<!-- SDA CUSTOM -->               <div style="max-height: 30vh; overflow: auto; min-width: 20vw; max-width: 30vw;">
<!-- SDA CUSTOM -->                   <div (mouseenter)="showFilterTooltip($event, op, filter)" (mouseleave)="hideFilterTooltip(op)">
<!-- SDA CUSTOM -->                       <div class="filter-tooltip-header">
<!-- SDA CUSTOM -->                           <span class="filters-size filter-tooltip-header-title">{{ resumen }}</span>
<!-- SDA CUSTOM -->                           <button *ngIf="!isFilterReadOnly(filter)" type="button" class="pi pi-trash filter-tooltip-remove-all" (click)="removeAllFilterItems(filter)"></button>
<!-- SDA CUSTOM -->                       </div>
<!-- SDA CUSTOM -->                       <div class="filter-tooltip-items">
<!-- SDA CUSTOM -->                           <div *ngFor="let item of filter.selectedItems" class="filter-tooltip-chip">
<!-- SDA CUSTOM -->                               <span class="customMultiselect filters-size filter-tooltip-chip-text">{{ item }}</span>
<!-- SDA CUSTOM -->                               <span *ngIf="!isFilterReadOnly(filter)" class="p-multiselect-token-icon pi pi-times-circle" (click)="removeFilterItem(filter, item)" style="cursor: pointer;"></span>
<!-- SDA CUSTOM -->                           </div>
<!-- SDA CUSTOM -->                       </div>
<!-- SDA CUSTOM -->                   </div>
<!-- SDA CUSTOM -->               </div>
<!-- SDA CUSTOM -->          </ng-template>
<!-- SDA CUSTOM -->      </p-overlayPanel>
                </div>
            </ng-container>
        </div>
    </div>
</div>

<!-- ============================================================== -->
<!-- GLOBAL FILTERS DIALOGS -->
<!-- ============================================================== -->
<dashboard-filter-dialog *ngIf="filterController" [controller]="filterController"></dashboard-filter-dialog>

<app-global-filter-dialog *ngIf="globalFilter"
    [(globalFilter)]="globalFilter"
    [globalFilterList]="globalFilters"
    [panels]="dashboard.panels"
    [dataSource]="dashboard.dataSource"
    (close)="onCloseGlobalFilter($event)">
</app-global-filter-dialog>

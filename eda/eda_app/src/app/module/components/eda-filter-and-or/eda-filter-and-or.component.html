<div class="query-preview-box">
  <p-scrollPanel [style]="{width: '100%', height: '80px'}" styleClass="custombar1">
    <p class="text-query" [innerHTML]="stringQuery"></p>
  </p-scrollPanel>
</div>

<div class="text-right eda-filter-legend">
  <span class="rounded pl-6 pr-6 global-filter" i18n="@@globalFilter">Filtro de informe</span>&nbsp;
  <span class="rounded pl-6 pr-6 panel-filter" i18n="@@panelFilter">Filtro de panel</span>
</div>
<br>

<div class="filter-and-or-container p-2">
  <gridster class="gridster" [options]="options">
    @for (item of dashboard; track item.filter_id) {
      <gridster-item
        [item]="item"
        class="gridster-item"
        [class.global-filter]="item.isGlobal"
        [class.panel-filter]="!item.isGlobal"
        [pTooltip]="getFilterJoins(item) + tooltipDescription(item)"
        [tooltipStyleClass]="'custom-tooltip'">

        <div class="d-flex">
          @if (!(item.x==0 && item.y==0)) {
            <div class="button-holder">
              <p-selectButton
                [options]="selectedButton"
                [(ngModel)]="item.value"
                [ngModelOptions]="{standalone: true}"
                [disabled]="(item.x==0 && item.y==0)"
                class="small-button"
                (click)="onButtonClick()">
              </p-selectButton>
            </div>
          }
          <span
            class="texto-filtro"
            [class.texto-derecha]="item.x == 0 && item.y == 0"
            [innerHTML]="getDisplayFilterStrAndOr(item)">
          </span>
        </div>

      </gridster-item>
    }
  </gridster>
</div>

<eda-dialog2
  header="Cambiar tipo de gráfico"
  [showApply]="false"
  (close)="onHide()"
  width="400px"
  height="auto"
  [overflow]="'auto'">
  <div content class="chart-type-selector-grid">
    @for (ct of chartTypes; track ct.subValue) {
      <div class="chart-type-selector-item" (click)="select(ct)">
        <span class="material-icons">{{ getOptionIcon(ct.subValue) }}</span>
        <span class="chart-type-selector-label">{{ ct.label }}</span>
      </div>
    }
  </div>
</eda-dialog2>

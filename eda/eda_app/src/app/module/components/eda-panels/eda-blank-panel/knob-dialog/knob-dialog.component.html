<eda-dialog2 width="80vw" height="80vh" [header]="title" (apply)="saveChartConfig()" (close)="closeChartConfig()">
  <div content class="flex flex-col md:flex-row flex-1 overflow-hidden h-[65vh]">
    <!-- Chart Preview -->
    <div class="p-6 flex-1 flex items-center justify-center border-b md:border-b-0 md:border-r bg-slate-50">
      <div class="relative w-full max-w-xl aspect-square">
          <panel-chart #PanelChartComponent
            [props]="panelChartConfig"
            class="h-full w-full block"
          ></panel-chart>
      </div>
    </div>

    <!-- Settings -->
    <div class="p-6 flex-1 overflow-y-auto">
      <div class="space-y-6">
        <div class="space-y-4">
          <div class="space-y-4">
            <h1 class="font-medium text-slate-500 uppercase" i18n="@@chartDisplayOptionsTitle">
              Opciones de visualización
            </h1>
  
            <div class="flex items-center justify-between">
              <div class="space-y-0.5">
                <div class="flex flex-col gap-2">
                  <label i18n="@@Limits" class="font-medium">
                    Limites
                  </label>
                  <input type="number" [(ngModel)]="min" class="w-full border p-1 rounded" placeholder="min">
                  <input type="number" [(ngModel)]="max" class="w-full border p-1 rounded" placeholder="max">
                </div>
              </div>
            </div>
          </div>

          <h1 i18n="@@colorsChartH6" class="font-medium text-slate-500 uppercase">Colors</h1>

          <!-- Semaphore toggle -->
          <div class="flex items-center justify-between border rounded-lg p-3 hover:bg-slate-50">
            <div class="space-y-0.5">
              <p class="font-medium" i18n="@@knobSemaphoreLabel">Color semafórico</p>
              <p class="text-xs text-slate-400" i18n="@@knobSemaphoreDesc">Rojo → amarillo → verde según el valor</p>
            </div>
            <button type="button" role="switch" [attr.aria-checked]="semaphoreColor"
              (click)="semaphoreColor = !semaphoreColor"
              class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
              [ngClass]="semaphoreColor ? 'bg-corporate-primary' : 'bg-gray-200'">
              <span class="pointer-events-none block h-5 w-5 rounded-full bg-white shadow-lg ring-0 transition-transform"
                [ngClass]="semaphoreColor ? 'translate-x-5' : 'translate-x-0.5'">
              </span>
            </button>
          </div>

          <!-- Manual color (only visible when semaphore is disabled) -->
          @if(!semaphoreColor){
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex items-center justify-between border rounded-lg p-3 hover:bg-slate-50">
              <span class="font-medium">{{ assignedColors[0]?.value }}</span>
              <div class="flex items-center gap-2">
                <input [(ngModel)]="assignedColors[0].color" (input)="handleInputColor()" class="text-md text-slate-500 font-mono w-[3.5vw]">
                <p-colorPicker [(ngModel)]="assignedColors[0].color" (onChange)="handleInputColor()" format="hex" appendTo="body" />
              </div>
            </div>
          </div>
          }

          <!-- Semaphore gradient preview -->
          @if(semaphoreColor){
          <div class="flex items-center gap-3 px-1">
            <div class="h-3 flex-1 rounded-full" style="background: linear-gradient(to right, hsl(0,85%,42%), hsl(60,85%,42%), hsl(120,85%,42%))"></div>
            <span class="text-xs text-slate-400">min → max</span>
          </div>
          }
        </div>
      </div>
    </div>
  </div>
</eda-dialog2>

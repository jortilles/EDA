<div class="panel-heading d-flex justify-content-between">

    <div class="panel-heading justify-content-between  h-75" style="margin-top: 0.2rem;">
        <div class="mb-0 pointer w-90 eda-title-panel" [innerHTML]="panel.title | sanitizeHtml"></div>
    </div>

<!-- SDA CUSTOM -->    <div *ngIf="display.editMode" class="d-flex align-items-center">
<!-- SDA CUSTOM -->        <div *ngIf="inject.canSave" class="mr-2 pointer" (click)="toggleLock()" [attr.title]="panel.locked ? unlockPanelTooltip : lockPanelTooltip">
<!-- SDA CUSTOM -->            <i [className]="panel.locked ? 'fa fa-lock' : 'fa fa-unlock'" [style.color]="panel.locked ? 'red' : 'green'"></i>
<!-- SDA CUSTOM -->        </div>
<!-- SDA CUSTOM -->       <div id="edit" style="text-align: right; max-height: 2rem; ">
                              <i class="fa fa-ellipsis-v btn" (click)="contextMenu.showContextMenu($event)"></i>
<!-- SDA CUSTOM -->       </div>
<!-- SDA CUSTOM -->    </div>

</div>




<eda-context-menu [inject]="contextMenu"></eda-context-menu>
<app-title-dialog *ngIf="editTittleController" [controller]="editTittleController"> </app-title-dialog>

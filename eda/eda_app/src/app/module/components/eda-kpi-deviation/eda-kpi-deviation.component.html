<div class="absolute inset-0 flex flex-col justify-center overflow-hidden"
     [style.background-color]="inject?.backgroundColor || null"
     style="padding: 10px 14px;">

  <!-- Etiqueta cabecera -->
  <div style="font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:0.06em;
              margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
    {{ displayHeader }}
  </div>

  <!-- Valor principal (con imagen prefijo si existe) -->
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;min-width:0;" [ngStyle]="getContainerStyle()">
    @if(inject?.prefixImage) {
      <img [src]="inject.prefixImage" style="height:1em;width:auto;object-fit:contain;flex-shrink:0;" />
    }
    <div class="font-bold" [ngStyle]="getValueStyle()"
         style="line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
      {{ formatValue(displayValue) }}
    </div>
  </div>

  <!-- Delta porcentual -->
  @if(displayVsPercent !== null) {
    <div style="display:flex;align-items:center;gap:3px;font-size:12px;font-weight:700;margin-bottom:12px;"
         [style.color]="fillColor">
      <span>{{ isPositive ? '▲' : '▼' }}</span>
      <span>{{ (isPositive ? '+' : '') }}{{ displayVsPercent | number:'1.1-1':'es' }}%</span>
    </div>
  }

  <!-- Barra de desviación -->
  @if(displayVsPercent !== null) {
    <div style="position:relative;">

      <!-- Track (mismo color que el fill, tono suave) -->
      <div style="position:relative;height:6px;border-radius:3px;"
           [style.background-color]="trackColor">

        <!-- Relleno (de 0 hasta la posición del valor) -->
        <div style="position:absolute;top:0;height:100%;border-radius:3px;transition:left 0.4s,width 0.4s;"
             [style.left]="barFillLeft + '%'"
             [style.width]="barFillWidth + '%'"
             [style.background-color]="fillColor">
        </div>

        <!-- Línea central (0) -->
        <div style="position:absolute;top:-4px;bottom:-4px;width:2px;left:50%;
                    transform:translateX(-50%);background:#999;border-radius:1px;">
        </div>

        <!-- Marcador en la posición del valor -->
        <div style="position:absolute;top:-7px;transform:translateX(-50%);
                    font-size:7px;line-height:1;pointer-events:none;"
             [style.left]="markerLeft + '%'"
             [style.color]="fillColor">
          ▼
        </div>

      </div>

      <!-- Etiquetas con escala dinámica -->
      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        <span style="font-size:8px;color:#bbb;">-{{ barScale }}%</span>
        <span style="font-size:8px;color:#999;font-weight:600;">0</span>
        <span style="font-size:8px;color:#bbb;">{{ barScale }}%</span>
      </div>

    </div>
  }

</div>

<eda-dialog2
  i18n-header="@@kpiMailConfigTitle"
  header="Configuración de la alerta KPI por email"
  width="70vw"
  height="65vh"
  overflow="auto"
  [disableApply]="disableApply()"
  (apply)="onApply()"
  (close)="onClose()">

  <div content class="p-8 bg-gray-50 h-[50vh]">
    <div class="grid grid-cols-3 gap-8">

      <!-- Frequency -->
      <div class="bg-white shadow-lg rounded-2xl p-6 space-y-5">
        <h5 class="text-lg font-semibold text-gray-800 mb-4" i18n="@@SendMailEvery">Enviar mail de alerta cada:</h5>

        <div class="flex flex-col">
          <input id="kpi-quantity" type="number" [(ngModel)]="quantity"
            class="kpi-mail-input w-full border border-gray-300 px-3 py-2.5 rounded-lg outline-none">
        </div>

        <label class="flex items-center gap-3 cursor-pointer w-fit">
          <input type="radio" name="kpiMailUnits" value="days" [(ngModel)]="units"
            class="kpi-mail-radio w-5 h-5 border-gray-300 rounded-full">
          <span class="text-base text-gray-700">{{daysSTR}}</span>
        </label>

        <div>
          @if (units === 'days') {
            <p i18n="@@at" class="mb-2 text-gray-600">A las</p>
            <p-calendar [timeOnly]="true" [stepMinute]="30" [(ngModel)]="hours" (onBlur)="onHoursBlur()"
              class="w-full border border-gray-300 px-3 py-2.5 rounded-lg shadow-sm"></p-calendar>
          }
        </div>

        <label class="flex items-center gap-3 cursor-pointer w-fit">
          <input type="radio" name="kpiMailUnits" value="hours" [(ngModel)]="units"
            class="kpi-mail-radio w-5 h-5 border-gray-300 rounded-full">
          <span class="text-base text-gray-700">{{hoursSTR}}</span>
        </label>

        <div class="pt-4 border-t border-gray-200">
          @if (enabled) {
            <h6 i18n="@@opcionMail" class="text-gray-600 font-medium">Enviar por email</h6>
          } @else {
            <h6 i18n="@@noMail" class="text-gray-600 font-medium">Sin alertas de correo</h6>
          }
          <p-inputSwitch id="kpiSwitchEnabled" class="mt-3" [(ngModel)]="enabled" tooltipPosition="left"></p-inputSwitch>
        </div>
      </div>

      <!-- Recipients -->
      <div class="bg-white shadow-lg rounded-2xl p-6 space-y-4">
        <h5 i18n="@@SendMailWho" class="text-lg font-semibold text-gray-800">Destinatarios</h5>

        <p-multiSelect
          [(ngModel)]="selectedUsers"
          [options]="users"
          optionLabel="label"
          dataKey="_id"
          i18n-defaultLabel="@@selectRecipients"
          defaultLabel="Selecciona los destinatarios *"
          class="flex w-full border border-gray-300 rounded-lg"
          [style]="{'width': '100%'}"
          [maxSelectedLabels]="2">
        </p-multiSelect>

        <div class="flex flex-col gap-1">
          <label for="kpi-other-recipients" i18n="@@otherRecipients" class="text-base text-gray-700 font-medium">Otros destinatarios:</label>
          <span i18n="@@otherRecipientsHint" class="text-sm text-gray-400">(separados por un espacio)</span>
          <input id="kpi-other-recipients" type="text" [(ngModel)]="otherRecipients"
            i18n-placeholder="@@otherRecipientsPlaceholder" placeholder="correo1@dominio.com correo2@dominio.com"
            class="kpi-mail-input w-full border border-gray-300 px-3 py-2.5 rounded-lg outline-none">
        </div>
      </div>

      <!-- Email content -->
      <div class="bg-white shadow-lg rounded-2xl p-6 flex flex-col">
        <h5 i18n="@@SendMailWhat" class="text-lg font-semibold text-gray-800 mb-3">Contenido del mail</h5>
        <textarea
          class="kpi-mail-textarea flex-1 w-full border border-gray-300 px-3 py-2.5 rounded-lg shadow-sm resize-none outline-none"
          rows="6"
          [(ngModel)]="mailMessage">
        </textarea>
      </div>

    </div>

    @if (enabled && allRecipientEmails.length > 0) {
      <div class="mt-4 text-base text-gray-600">
        <span class="font-semibold" i18n="@@sendToSummary">Enviar a:</span>
        {{ allRecipientEmails.join(', ') }}
      </div>
    }
  </div>

</eda-dialog2>
